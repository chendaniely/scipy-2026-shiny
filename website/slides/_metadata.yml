format:
  revealjs:
    footer: "SciPy 2026. chendaniely/scipy-2026-shiny"
    slide-number: true
    show-slide-number: all
    theme: [default, brand, slides-theme.scss]
    highlight-style: monokai
    smaller: true
    logo: /img/conf-logo.png
    title-slide-attributes:
      data-background-image: /img/scipy2026-loon.png
      data-background-size: 320px
      data-background-position: 97% 97%
      data-background-opacity: "0.85"
    revealjs-plugins:
      - chat-bubbles
      - pointer
      - a11y
    revealjs-a11y:
        revealjs-a11y:
          high-contrast: false
          alt-text-warnings: true
          slide-change-cue:
            visual: true
            audio: false

execute:
  echo: true

pointer:
  key: "q"
  color: "#EA1F26"
  pointerSize: 16
  alwaysVisible: false
