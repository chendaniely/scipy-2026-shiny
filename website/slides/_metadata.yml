format:
  revealjs:
    footer: "SciPy 2026. chendaniely/scipy-2026-shiny"
    slide-number: true
    show-slide-number: all
    theme: default
    highlight-style: monokai
    revealjs-plugins:
      - chat-bubbles
      - pointer
      - a11y
    revealjs-a11y:
        revealjs-a11y:
          high-contrast: false
          alt-text-warnings: true
          slide-change-cue:
            visual: true
            audio: false

execute:
  echo: true

pointer:
  key: "q"
  color: "#ff0000"
  pointerSize: 16
  alwaysVisible: false
